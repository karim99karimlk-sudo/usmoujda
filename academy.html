<body>
  <header>
  <div class="logo">
   <a href="index.html">UNION</a>

  <nav id="nav">
    <i class="fa-solid fa-xmark close-menu" id="close-menu"></i>
    <ul>
      <li><a class="hover-underline" href="academy.html">Academy</a></li>

    </ul>
  </nav>

  <div class="header-icons">
    <div class=""></div>
    <div class=""></div>
    <div class=""></div>
    <div class=""></div>
    <div class=""></div>
    <div class=""></div>
    <!-- 🌍 Language -->
    <div class="lang-container" id="lang-btn">
      <div class="lang-icon">
        <img src="USMO IMG/Icons/language-solid.svg" alt="">
      </div>

      <div class="lang-dropdown" id="lang-menu">
        <a href="#">English</a>
        <a href="#">العربية</a>
        <a href="#">Français</a>
      </div>
    </div>

    <!-- ☰ Menu -->
    <i class="fa-solid fa-bars" id="menu-toggle"></i>
    
  </div>
  </header>
  <main>
    <section class="hero">
      <video src="WhatsApp Video 2026-04-13 at 14.42.41.mp4" autoplay muted loop></video>
    </section>
  </main>
 <script>
  
  const menuToggle = document.getElementById("menu-toggle");
  const nav = document.getElementById("nav");

  const langBtn = document.getElementById("lang-btn");
  const langMenu = document.getElementById("lang-menu");

  // ☰ MENU CLICK
  menuToggle.onclick = (e) => {
    e.stopPropagation();
    nav.classList.toggle("active");
  };

  // 🌍 LANGUAGE CLICK
  langBtn.onclick = (e) => {
    e.stopPropagation();
    langMenu.classList.toggle("active");
  };

  // CLICK OUTSIDE CLOSES EVERYTHING
  document.onclick = () => {
    nav.classList.remove("active");
    langMenu.classList.remove("active");
  };



  const closeMenu = document.getElementById("close-menu");

// OPEN
menuToggle.onclick = (e) => {
  e.stopPropagation();
  nav.classList.add("active");
  langMenu.classList.remove("active");
};

// CLOSE with X
closeMenu.onclick = (e) => {
  e.stopPropagation();
  nav.classList.remove("active");
};

// LANGUAGE
langBtn.onclick = (e) => {
  e.stopPropagation();
  langMenu.classList.toggle("active");
  nav.classList.remove("active");
};

// CLICK OUTSIDE
document.onclick = (e) => {
  if (!nav.contains(e.target) && !menuToggle.contains(e.target)) {
    nav.classList.remove("active");
  }

  if (!langBtn.contains(e.target)) {
    langMenu.classList.remove("active");
  }
};
  </script>
</body>
</html>
